<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <!-- crucial mobile viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>All India FM · mobile radio</title>
  <!-- Font Awesome 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: #0b1722;
      /* solid dark backup */
      background: linear-gradient(145deg, #0b1722, #1a2e3f);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      /* let content breathe from top */
      justify-content: center;
      padding: 0.5rem;
      /* tiny outer gap */
    }

    /* main app container — mobile first, soft card */
    .radio-app {
      width: 100%;
      max-width: 480px;
      /* typical mobile width, looks like a real app */
      background: rgba(18, 32, 43, 0.85);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 200, 120, 0.15);
      border-radius: 2rem;
      /* consistent roundness */
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
      padding: 1rem 0.9rem 1.2rem 0.9rem;
      margin: 0.3rem auto;
    }

    /* ----- header ----- */
    .app-header {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0.75rem;
      margin-bottom: 1.2rem;
    }

    .title-section h1 {
      font-size: 1.4rem;
      /* smaller for mobile */
      font-weight: 700;
      background: linear-gradient(135deg, #f9d77e, #ffb347);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
      word-break: break-word;
    }

    .title-section h1 i {
      color: #ffb85b;
      background: #1e3a5f;
      padding: 0.45rem;
      border-radius: 50%;
      font-size: 1.2rem;
    }

    /* search full width */
    .search-box {
      background: #1f3443;
      border-radius: 2.5rem;
      padding: 0.65rem 1.2rem;
      display: flex;
      align-items: center;
      border: 1px solid #4e6b82;
      width: 100%;
    }

    .search-box i {
      color: #f5b342;
      margin-right: 10px;
      font-size: 1rem;
    }

    .search-box input {
      background: transparent;
      border: none;
      outline: none;
      color: white;
      width: 100%;
      font-size: 1rem;
    }

    .search-box input::placeholder {
      color: #9bb4cc;
      font-size: 0.95rem;
    }

    /* ----- now playing card (mobile compact) ----- */
    .now-playing-card {
      background: linear-gradient(135deg, #1c3142, #12212e);
      border-radius: 2rem;
      padding: 1rem 1.2rem;
      margin-bottom: 1.4rem;
      border: 1px solid #f5b34240;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.7rem;
    }

    .station-info {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      flex: 2 1 200px;
    }

    .station-icon {
      width: 58px;
      height: 58px;
      background: #253e54;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      border: 2px solid #f5b342;
      color: #f9d27e;
      flex-shrink: 0;
    }

    .station-meta h3 {
      color: #b0d0ed;
      font-weight: 400;
      font-size: 0.75rem;
      letter-spacing: 0.3px;
    }

    .current-station-name {
      font-size: 1.25rem;
      font-weight: 700;
      color: white;
      line-height: 1.2;
    }

    .current-freq {
      color: #c0d4e6;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 3px;
    }

    /* player controls row : volume and big play */
    .player-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      /* take full width on small screens */
      gap: 0.5rem;
      margin-top: 0.2rem;
    }

    .volume-control {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: #00000030;
      padding: 0.3rem 0.8rem;
      border-radius: 40px;
      border: 1px solid #4b6f8c;
      flex: 1;
    }

    .volume-control i {
      color: #f0c480;
      font-size: 0.9rem;
    }

    #volumeSlider {
      width: 100%;
      accent-color: #f5b342;
      height: 5px;
    }

    .play-pause-btn {
      background: #f5b342;
      border: none;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      font-size: 1.8rem;
      color: #0b1c2c;
      cursor: pointer;
      box-shadow: 0 6px 14px #f5b34280;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.15s;
      flex-shrink: 0;
    }

    .play-pause-btn.playing {
      background: #46c98b;
      box-shadow: 0 6px 14px #46c98bb3;
    }

    /* filter pills — scrollable horizontally on mobile */
    .filter-section {
      display: flex;
      flex-wrap: nowrap;
      overflow-x: auto;
      gap: 8px;
      padding: 0.2rem 0 0.8rem 0;
      margin-bottom: 0.5rem;
      scrollbar-width: thin;
      -webkit-overflow-scrolling: touch;
      white-space: nowrap;
      align-items: center;
    }

    .filter-section::-webkit-scrollbar {
      height: 3px;
    }

    .filter-section::-webkit-scrollbar-thumb {
      background: #f5b342;
      border-radius: 20px;
    }

    .filter-label {
      color: #b3cde0;
      font-size: 0.8rem;
      margin-right: 2px;
      flex-shrink: 0;
      background: #1e3444;
      padding: 0.2rem 0.8rem;
      border-radius: 30px;
      border: 1px solid #42647e;
    }

    .filter-pill {
      background: #1f3445;
      border: 1px solid #3f5e79;
      color: #deecfb;
      padding: 0.4rem 1rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.15s;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .filter-pill i {
      color: #f5b342;
      font-size: 0.7rem;
    }

    .filter-pill.active {
      background: #f5b342;
      border-color: #f5b342;
      color: #0d1c2b;
      font-weight: 600;
    }

    .filter-pill.active i {
      color: #0b1f2e;
    }

    /* station grid — single column for mobile */
    .station-grid-container {
      max-height: 440px;
      overflow-y: auto;
      padding-right: 4px;
      border-radius: 1.5rem;
      scrollbar-width: thin;
    }

    .station-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .station-card {
      background: #1d3141f0;
      border: 1px solid #3b5c78;
      border-radius: 2rem;
      padding: 1rem 1.2rem;
      cursor: pointer;
      transition: 0.1s;
      box-shadow: 0 4px 8px #00000040;
      display: flex;
      flex-direction: column;
    }

    .station-card:hover {
      background: #274a62;
      border-color: #f5b342;
    }

    .station-card.active-station {
      background: #1f4b66;
      border: 2px solid #f5b342;
    }

    .card-tags {
      display: flex;
      gap: 8px;
      font-size: 0.65rem;
      color: #bcd8f0;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }

    .card-tags span {
      background: #0e2a3b;
      padding: 0.2rem 0.8rem;
      border-radius: 20px;
      border: 1px solid #567e9c;
    }

    .card-name {
      font-size: 1.2rem;
      font-weight: 700;
      color: white;
      line-height: 1.3;
    }

    .card-frequency {
      font-family: monospace;
      background: #00000030;
      padding: 0.2rem 1rem;
      border-radius: 30px;
      display: inline-block;
      margin-top: 7px;
      color: #f5b342;
      border: 1px solid #f5b34260;
      align-self: flex-start;
    }

    .card-lang {
      margin-top: 8px;
      font-size: 0.8rem;
      color: #c0daf5;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .no-stations {
      text-align: center;
      padding: 2rem;
      color: #bdd8f0;
      background: #1b314180;
      border-radius: 3rem;
    }

    #radioPlayer {
      display: none;
    }

    /* tiny extra touch */
    .current-freq i,
    .card-lang i {
      color: #f5b342;
    }

    /* small devices ( < 380px ) even more compact */
    @media (max-width: 360px) {
      .radio-app {
        padding: 0.8rem 0.6rem;
      }

      .current-station-name {
        font-size: 1.1rem;
      }

      .play-pause-btn {
        width: 48px;
        height: 48px;
        font-size: 1.5rem;
      }

      .station-icon {
        width: 48px;
        height: 48px;
        font-size: 1.8rem;
      }
    }
  </style>
</head>

<body>
  <div class="radio-app">
    <!-- header with search (stacked) -->
    <div class="app-header">
      <div class="title-section">
        <h1><i class="fas fa-satellite-dish"></i> AIR · India FM</h1>
      </div>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search station, city, language...">
      </div>
    </div>

    <!-- now playing card — mobile optimized -->
    <div class="now-playing-card">
      <div class="station-info">
        <div class="station-icon" id="stationIcon"><i class="fas fa-tower-broadcast"></i></div>
        <div class="station-meta">
          <h3><i class="fas fa-play" style="color:#f5b342"></i> NOW PLAYING</h3>
          <div class="current-station-name" id="currentStationName">Radio Mirchi 98.3 FM</div>
          <div class="current-freq" id="currentStationFreq"><i class="fas fa-signal"></i> 98.3 MHz · Mumbai</div>
        </div>
      </div>
      <div class="player-controls">
        <div class="volume-control">
          <i class="fas fa-volume-low"></i>
          <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
          <i class="fas fa-volume-high"></i>
        </div>
        <button class="play-pause-btn" id="playPauseBtn"><i class="fas fa-play" id="playPauseIcon"></i></button>
      </div>
    </div>

    <!-- dynamic filter pills (scrollable) -->
    <div class="filter-section" id="filterContainer">
      <!-- injected by js -->
    </div>

    <!-- station list (vertical) -->
    <div class="station-grid-container">
      <div class="station-grid" id="stationGrid"></div>
    </div>

    <audio id="radioPlayer" preload="none"></audio>
  </div>

  <script>
    (function () {
      // ---------- station data (same as original) ----------
      const stations = [
        { name: 'Radio Mirchi 98.3 FM', freq: '98.3', city: 'Mumbai', lang: 'Hindi', format: 'Bollywood', stream: 'https://eu8.fastcast4u.com/proxy/clyedupq?mp=%2F1?aw_0_req_lsid=2c0fae177108c9a42a7cf24878625444', icon: '🎤' },
        { name: 'Vividh Bharati', freq: '102.6', city: 'Delhi', lang: 'Hindi', format: 'National', stream: 'https://air.pc.cdn.bitgravity.com/air/live/pbaudio001/playlist.m3u8', icon: '🇮🇳' },
        { name: '92.7 Big FM', freq: '92.7', city: 'Mumbai', lang: 'Hindi', format: 'Bollywood', stream: 'https://stream.zeno.fm/dbstwo3dvhhtv', icon: '🔊' },
        { name: 'Radio BBC World Service', freq: '101.1', city: 'Delhi', lang: 'English', format: 'News', stream: 'https://stream.live.vc.bbcmedia.co.uk/bbc_world_service', icon: '🌍' },
        { name: '93.5 Red FM', freq: '93.5', city: 'Delhi', lang: 'Hindi', format: 'News', stream: 'https://stream.zeno.fm/9phrkb1e3v8uv', icon: '🌍' },
        { name: 'Ishq FM', freq: '104.2', city: 'Delhi', lang: 'Hindi', format: 'Love Songs', stream: 'https://drive.uber.radio/uber/bollywoodlove/icecast.audio', icon: '❤️' },
        { name: 'Radio City Hindi', freq: '91.1', city: 'Mumbai', lang: 'Hindi', format: 'Hindi', stream: 'https://stream-177.zeno.fm/pxc55r5uyc9uv?zt=eyJhbGciOiJIUzI1NiJ9.eyJzdHJlYW0iOiJweGM1NXI1dXljOXV2IiwiaG9zdCI6InN0cmVhbS0xNzcuemVuby5mbSIsInJ0dGwiOjUsImp0aSI6ImplWXdDUDhwU3ZpZTQtOHRDSDVoR3ciLCJpYXQiOjE3NzMxNDg5MTQsImV4cCI6MTc3MzE0ODk3NH0.wJOSrzcCqqTb8SX7I-IT-drPH4pXZMfw22zCjjjcLp0', icon: '🏬' },
        { name: 'Radio Mango 91.9', freq: '91.9', city: 'Kochi', lang: 'Malayalam', format: 'Malayalam', stream: 'https://listen.openstream.co/4635/audio', icon: '🥭' },
        { name: 'Hungama 90s Once Again', freq: '95.0', city: 'Mumbai', lang: 'Hindi', format: 'Old songs', stream: 'https://stream.zeno.fm/rm4i9pdex3cuv', icon: '🕺' },
        { name: 'Mohammed Rafi Radio', freq: '95.0', city: 'Mumbai', lang: 'Hindi', format: 'Old songs', stream: 'https://stream.zeno.fm/2xx62x8ztm0uv', icon: '🕺' }
      ];

      // ----- DOM -----
      const grid = document.getElementById('stationGrid');
      const filterContainer = document.getElementById('filterContainer');
      const searchInput = document.getElementById('searchInput');
      const audioPlayer = document.getElementById('radioPlayer');
      const playBtn = document.getElementById('playPauseBtn');
      const playIcon = document.getElementById('playPauseIcon');
      const volSlider = document.getElementById('volumeSlider');
      const currentNameSpan = document.getElementById('currentStationName');
      const currentFreqSpan = document.getElementById('currentStationFreq');
      const stationIconDiv = document.getElementById('stationIcon');

      // state
      let activeStation = stations[0];
      let currentFilter = 'all';
      let currentLanguageFilter = '';
      let currentFormatFilter = '';
      let searchQuery = '';
      let isPlaying = false;

      // languages & formats for filters
      const languages = [...new Set(stations.map(s => s.lang))].sort();
      const formats = [...new Set(stations.map(s => s.format))].sort();

      // ---- render filter pills (mobile friendly) ----
      function renderFilterPills() {
        let html = `<div class="filter-pill active" data-filter="all" data-type="all"><i class="fas fa-globe"></i> All</div>`;
        html += `<span class="filter-label"><i class="fas fa-language"></i> Lang</span>`;
        languages.forEach(lang => {
          html += `<div class="filter-pill" data-filter="${lang}" data-type="lang"><i class="fas fa-flag"></i> ${lang}</div>`;
        });
        html += `<span class="filter-label"><i class="fas fa-tag"></i> Format</span>`;
        formats.slice(0, 6).forEach(fmt => {   // keep horizontal manageable
          html += `<div class="filter-pill" data-filter="${fmt}" data-type="format"><i class="fas fa-music"></i> ${fmt}</div>`;
        });
        filterContainer.innerHTML = html;
      }
      renderFilterPills();

      // filter logic
      function filterStations() {
        return stations.filter(s => {
          if (currentFilter !== 'all') {
            if (currentLanguageFilter && s.lang !== currentLanguageFilter) return false;
            if (currentFormatFilter && s.format !== currentFormatFilter) return false;
          }
          if (searchQuery) {
            const q = searchQuery.toLowerCase();
            return s.name.toLowerCase().includes(q) || s.city.toLowerCase().includes(q) || s.lang.toLowerCase().includes(q) || s.format.toLowerCase().includes(q);
          }
          return true;
        });
      }

      // render grid (vertical cards)
      function renderGrid() {
        const filtered = filterStations();
        if (filtered.length === 0) {
          grid.innerHTML = '<div class="no-stations"><i class="fas fa-cloud-moon"></i> No matching stations</div>';
          return;
        }
        let html = '';
        filtered.forEach(station => {
          const activeClass = (station.name === activeStation.name && station.city === activeStation.city) ? 'active-station' : '';
          html += `
            <div class="station-card ${activeClass}" data-name="${station.name}" data-city="${station.city}" data-freq="${station.freq}" data-lang="${station.lang}" data-format="${station.format}" data-stream="${station.stream}" data-icon="${station.icon}">
              <div class="card-tags"><span>${station.city}</span><span>${station.lang}</span></div>
              <div class="card-name">${station.name}</div>
              <div class="card-frequency">${station.freq} MHz</div>
              <div class="card-lang"><i class="fas fa-microphone-alt"></i> ${station.format}</div>
            </div>
          `;
        });
        grid.innerHTML = html;
      }

      // set active station (update UI, audio src)
      function setActiveStation(station) {
        activeStation = station;
        currentNameSpan.innerText = station.name;
        currentFreqSpan.innerHTML = `<i class="fas fa-signal"></i> ${station.freq} MHz · ${station.city}`;
        stationIconDiv.innerHTML = station.icon ? `<span style="font-size:2.2rem;">${station.icon}</span>` : '<i class="fas fa-tower-broadcast"></i>';

        document.querySelectorAll('.station-card').forEach(card => {
          const name = card.dataset.name;
          const city = card.dataset.city;
          if (name === station.name && city === station.city) card.classList.add('active-station');
          else card.classList.remove('active-station');
        });

        if (audioPlayer.src !== station.stream) {
          audioPlayer.src = station.stream;
          audioPlayer.load();
          if (isPlaying) {
            audioPlayer.play().catch(() => { });
          }
        }
      }

      // play/pause toggle
      function togglePlay() {
        if (!activeStation) return;
        if (isPlaying) {
          audioPlayer.pause();
          playBtn.classList.remove('playing');
          playIcon.className = 'fas fa-play';
        } else {
          if (!audioPlayer.src) {
            audioPlayer.src = activeStation.stream;
            audioPlayer.load();
          }
          audioPlayer.play()
            .then(() => {
              playBtn.classList.add('playing');
              playIcon.className = 'fas fa-pause';
            })
            .catch(() => alert('Stream unavailable.'));
        }
        isPlaying = !isPlaying;
      }

      // ----- EVENT LISTENERS (mobile friendly) -----
      filterContainer.addEventListener('click', (e) => {
        const pill = e.target.closest('.filter-pill');
        if (!pill) return;
        const filterVal = pill.dataset.filter;
        const type = pill.dataset.type;

        document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');

        if (type === 'all') {
          currentLanguageFilter = '';
          currentFormatFilter = '';
          currentFilter = 'all';
        } else if (type === 'lang') {
          currentLanguageFilter = filterVal;
          currentFormatFilter = '';
          currentFilter = 'lang';
        } else if (type === 'format') {
          currentFormatFilter = filterVal;
          currentLanguageFilter = '';
          currentFilter = 'format';
        }
        renderGrid();
      });

      searchInput.addEventListener('input', (e) => {
        searchQuery = e.target.value;
        renderGrid();
      });

      grid.addEventListener('click', (e) => {
        const card = e.target.closest('.station-card');
        if (!card) return;
        const station = {
          name: card.dataset.name,
          city: card.dataset.city,
          freq: card.dataset.freq,
          lang: card.dataset.lang,
          format: card.dataset.format,
          stream: card.dataset.stream,
          icon: card.dataset.icon
        };
        setActiveStation(station);
        if (isPlaying) {
          audioPlayer.play().catch(() => { });
        }
      });

      playBtn.addEventListener('click', togglePlay);

      audioPlayer.addEventListener('pause', () => {
        isPlaying = false;
        playBtn.classList.remove('playing');
        playIcon.className = 'fas fa-play';
      });
      audioPlayer.addEventListener('ended', () => {
        isPlaying = false;
        playBtn.classList.remove('playing');
        playIcon.className = 'fas fa-play';
      });

      volSlider.addEventListener('input', (e) => { audioPlayer.volume = parseFloat(e.target.value); });
      audioPlayer.volume = 0.7;

      // initial render
      renderGrid();
      setActiveStation(stations[0]);
    })();
  </script>
</body>

</html>
