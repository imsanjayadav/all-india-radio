<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Aura Radio · Premium Experience</title>
  <!-- Google Fonts: Inter & Outfit -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap"
    rel="stylesheet">
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-color: #09090b;
      --card-bg: rgba(24, 24, 27, 0.7);
      --accent-color: #f59e0b;
      --accent-glow: rgba(245, 158, 11, 0.3);
      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --glass-border: rgba(255, 255, 255, 0.08);
      --nav-height: 70px;
      --player-height: 64px;
      --safe-area-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      user-select: none;
    }

    h1,
    h2,
    h3 {
      font-family: 'Outfit', sans-serif;
    }

    /* ----- Layout Containers ----- */
    .app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 500px;
      margin: 0 auto;
      position: relative;
    }

    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px calc(var(--nav-height) + var(--player-height) + 40px + var(--safe-area-bottom));
      scrollbar-width: none;
    }

    .scroll-area::-webkit-scrollbar {
      display: none;
    }

    /* ----- Header Section ----- */
    .header {
      padding: 20px 0 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent-color);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .profile-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--card-bg);
      border: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
    }

    /* ----- Search Box ----- */
    .search-container {
      margin: 20px 0;
    }

    .search-bar {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.3s ease;
    }

    .search-bar:focus-within {
      border-color: var(--accent-color);
      box-shadow: 0 0 15px var(--accent-glow);
    }

    .search-bar i {
      color: var(--text-secondary);
    }

    .search-bar input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      width: 100%;
      font-size: 1rem;
    }

    /* ----- Categories ----- */
    .section-title {
      font-size: 1.1rem;
      margin-bottom: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .category-pills {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 20px;
      scrollbar-width: none;
    }

    .category-pills::-webkit-scrollbar {
      display: none;
    }

    .pill {
      background: var(--card-bg);
      border: 1px solid var(--glass-border);
      padding: 8px 20px;
      border-radius: 50px;
      white-space: nowrap;
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .pill.active {
      background: var(--accent-color);
      color: #000;
      border-color: var(--accent-color);
      font-weight: 600;
    }

    /* ----- Featured Card ----- */
    .featured-container {
      margin-bottom: 24px;
    }

    .featured-card {
      position: relative;
      height: 180px;
      border-radius: 24px;
      overflow: hidden;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(217, 119, 6, 0.3);
    }

    .featured-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.6), transparent);
      z-index: 1;
    }

    .featured-content {
      position: relative;
      z-index: 2;
    }

    .featured-tag {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(5px);
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: inline-block;
      margin-bottom: 8px;
    }

    .featured-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    /* ----- Station List ----- */
    .station-grid {
      display: grid;
      gap: 12px;
    }

    .station-card {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .station-card:active {
      transform: scale(0.97);
    }

    .station-card.active {
      border-color: var(--accent-color);
      background: rgba(245, 158, 11, 0.1);
    }

    .station-image {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: #18181b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      border: 1px solid var(--glass-border);
    }

    .station-details {
      flex: 1;
    }

    .station-name {
      font-weight: 600;
      font-size: 1.05rem;
      margin-bottom: 4px;
    }

    .station-meta {
      display: flex;
      gap: 8px;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .station-freq {
      color: var(--accent-color);
      font-weight: 600;
    }

    .fav-btn {
      color: var(--text-secondary);
      font-size: 1.2rem;
      padding: 8px;
    }

    .fav-btn.active {
      color: #ef4444;
    }

    /* ----- Bottom Mini Player ----- */
    .mini-player {
      position: absolute;
      bottom: 5px;
      left: 12px;
      right: 12px;
      height: var(--player-height);
      background: rgba(32, 32, 37, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      z-index: 100;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .player-expanded .mini-player {
      bottom: 0;
      left: 0;
      right: 0;
      height: 100%;
      border-radius: 0;
      padding: 60px 30px;
      flex-direction: column;
      justify-content: space-between;
      background: var(--bg-color);
    }

    .mini-player-info {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      overflow: hidden;
    }

    .mini-player-art {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: var(--accent-color);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: #000;
    }

    .mini-player-text {
      overflow: hidden;
    }

    .mini-player-name {
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mini-player-status {
      font-size: 0.75rem;
      color: var(--accent-color);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      background: var(--accent-color);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent-color);
      animation: pulse 1.5s infinite;
    }

    .mini-player-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .play-circle {
      width: 40px;
      height: 40px;
      background: var(--accent-color);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-size: 1.1rem;
      cursor: pointer;
    }

    /* ----- Expanded Player ----- */
    .expanded-only {
      display: none;
    }

    .player-expanded .expanded-only {
      display: flex;
      flex-direction: column;
      width: 100%;
      align-items: center;
      text-align: center;
    }

    .player-expanded .mini-player-info {
      flex-direction: column;
      gap: 30px;
    }

    .player-expanded .mini-player-art {
      width: 280px;
      height: 280px;
      border-radius: 40px;
      font-size: 8rem;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
    }

    .player-expanded .mini-player-text {
      text-align: center;
    }

    .player-expanded .mini-player-name {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .player-expanded .mini-player-status {
      font-size: 1rem;
      justify-content: center;
    }

    .player-expanded .mini-player-controls {
      gap: 40px;
      margin: 40px 0;
    }

    .player-expanded .play-circle {
      width: 80px;
      height: 80px;
      font-size: 2.2rem;
    }

    .player-close {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 10px;
      font-size: 1.5rem;
      color: var(--text-secondary);
      display: none;
    }

    .player-expanded .player-close {
      display: block;
    }

    .volume-container {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 20px;
    }

    .volume-container i {
      color: var(--text-secondary);
    }

    .volume-slider {
      flex: 1;
      height: 6px;
      -webkit-appearance: none;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      outline: none;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: var(--accent-color);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
    }

    /* ----- Bottom Nav ----- */
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: calc(var(--nav-height) + var(--safe-area-bottom));
      background: rgba(18, 18, 18, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 0 20px var(--safe-area-bottom);
      z-index: 90;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--text-secondary);
      font-size: 0.7rem;
      font-weight: 500;
      cursor: pointer;
      padding: 10px;
      transition: all 0.2s ease;
    }

    .nav-item.active {
      color: var(--accent-color);
    }

    .nav-item i {
      font-size: 1.2rem;
    }

    /* ----- Animations ----- */
    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 1;
      }

      50% {
        transform: scale(1.5);
        opacity: 0.6;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .fade-in {
      animation: fadeIn 0.4s ease-out forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* No Stations Found */
    .no-results {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
    }

    .no-results i {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    /* Footer Copyright */
    .app-footer {
      text-align: center;
      padding: 40px 0 20px;
      color: var(--text-secondary);
      font-size: 0.8rem;
      opacity: 0.6;
      border-top: 1px solid var(--glass-border);
      margin-top: 40px;
    }
  </style>
</head>

<body>
  <div class="app-container" id="app">
    <!-- Header -->
    <div class="scroll-area">
      <div class="header">
        <div class="logo">
          <i class="fas fa-wave-square"></i>
          <div style="display: flex; flex-direction: column;">
            <span>Aura Radio</span>
            <span style="font-size: 0.65rem; color: var(--text-secondary); font-weight: 400; font-family: 'Inter', sans-serif; letter-spacing: 0.5px; opacity: 0.8;">Vision X Digital</span>
          </div>
        </div>
        <div class="profile-btn">
          <i class="fas fa-user"></i>
        </div>
      </div>

      <!-- Search -->
      <div class="search-container">
        <div class="search-bar">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="Search station, city, news...">
        </div>
      </div>

      <!-- Categories -->
      <div class="category-pills" id="categoryContainer">
        <!-- JS Injection -->
      </div>

      <!-- Featured -->
      <div class="featured-container">
        <div class="section-title">Featured Station</div>
        <div class="featured-card" id="featuredCard">
          <div class="featured-content">
            <span class="featured-tag">Editor's Choice</span>
            <div class="featured-title" id="featuredName">Radio Mirchi 98.3</div>
            <div class="station-meta" style="color: rgba(255,255,255,0.8)">
              <span id="featuredFreq">98.3 MHz</span> • <span id="featuredCity">Mumbai</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Station List -->
      <div class="section-title">Explore Stations</div>
      <div class="station-grid" id="stationGrid">
        <!-- JS Injection -->
      </div>

      <!-- Footer / Copyright -->
      <div class="app-footer">
        <p>© 2026 Vision X Digital Private Limited</p>
      </div>
    </div>

    <!-- Mini Player / Expanded Player -->
    <div class="mini-player" id="player">
      <div class="player-close" id="playerClose">
        <i class="fas fa-chevron-down"></i>
      </div>

      <div class="mini-player-info" id="playerMainInfo">
        <div class="mini-player-art" id="playerIcon">🎤</div>
        <div class="mini-player-text">
          <div class="mini-player-name" id="playerName">Radio Mirchi 98.3 FM</div>
          <div class="mini-player-status">
            <div class="live-dot"></div>
            <span id="playerStatus">Live</span>
          </div>
        </div>
      </div>

      <div class="mini-player-controls">
        <div class="expanded-only" style="flex-direction: row; gap: 40px;">
          <i class="fas fa-backward-step" style="font-size: 1.5rem; color: var(--text-secondary);"></i>
          <div class="play-circle" id="playBtn">
            <i class="fas fa-play" id="playIcon"></i>
          </div>
          <i class="fas fa-forward-step" style="font-size: 1.5rem; color: var(--text-secondary);"></i>
        </div>
        <!-- Simple play for mini player -->
        <div class="play-circle" id="miniPlayBtn">
          <i class="fas fa-play" id="miniPlayIcon"></i>
        </div>
      </div>

      <div class="expanded-only" style="width: 100%;">
        <div class="volume-container">
          <i class="fas fa-volume-low"></i>
          <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
          <i class="fas fa-volume-high"></i>
        </div>
      </div>
    </div>

    <!-- Bottom Nav -->
    <!-- <div class="bottom-nav">
      <div class="nav-item active">
        <i class="fas fa-home"></i>
        <span>Home</span>
      </div>
      <div class="nav-item">
        <i class="fas fa-compass"></i>
        <span>Explore</span>
      </div>
      <div class="nav-item">
        <i class="fas fa-heart"></i>
        <span>Favorites</span>
      </div>
      <div class="nav-item">
        <i class="fas fa-book-open"></i>
        <span>Library</span>
      </div>
    </div> -->

    <audio id="audioPlayer" preload="none"></audio>
  </div>

  <script>
    (function () {
      const stations = [
        { name: 'Radio Mirchi 98.3 FM', freq: '98.3', city: 'Mumbai', lang: 'Hindi', format: 'Bollywood', stream: 'https://eu8.fastcast4u.com/proxy/clyedupq?mp=%2F1?aw_0_req_lsid=2c0fae177108c9a42a7cf24878625444', icon: '🎤' },
        { name: 'Vividh Bharati', freq: '102.6', city: 'Delhi', lang: 'Hindi', format: 'National', stream: 'https://air.pc.cdn.bitgravity.com/air/live/pbaudio001/playlist.m3u8', icon: '🇮🇳' },
        { name: '92.7 Big FM', freq: '92.7', city: 'Mumbai', lang: 'Hindi', format: 'Bollywood', stream: 'https://stream.zeno.fm/dbstwo3dvhhtv', icon: '🔊' },
        { name: 'Radio BBC World Service', freq: '101.1', city: 'Delhi', lang: 'English', format: 'News', stream: 'https://stream.live.vc.bbcmedia.co.uk/bbc_world_service', icon: '🌍' },
        { name: '93.5 Red FM', freq: '93.5', city: 'Delhi', lang: 'Hindi', format: 'News', stream: 'https://stream.zeno.fm/9phrkb1e3v8uv', icon: '🌍' },
        { name: 'Ishq FM', freq: '104.2', city: 'Delhi', lang: 'Hindi', format: 'Love Songs', stream: 'https://drive.uber.radio/uber/bollywoodlove/icecast.audio', icon: '❤️' },
        { name: 'Radio City Hindi', freq: '91.1', city: 'Mumbai', lang: 'Hindi', format: 'Hindi', stream: 'https://stream-177.zeno.fm/pxc55r5uyc9uv?zt=eyJhbGciOiJIUzI1NiJ9.eyJzdHJlYW0iOiJweGM1NXI1dXljOXV2IiwiaG9zdCI6InN0cmVhbS0xNzcuemVuby5mbSIsInJ0dGwiOjUsImp0aSI6ImplWXdDUDhwU3ZpZTQtOHRDSDVoR3ciLCJpYXQiOjE3NzMxNDg5MTQsImV4cCI6MTc3MzE0ODk3NH0.wJOSrzcCqqTb8SX7I-IT-drPH4pXZMfw22zCjjjcLp0', icon: '🏬' },
        { name: 'Radio Mango 91.9', freq: '91.9', city: 'Kochi', lang: 'Malayalam', format: 'Malayalam', stream: 'https://listen.openstream.co/4635/audio', icon: '🥭' },
        { name: 'Hungama 90s Once Again', freq: '95.0', city: 'Mumbai', lang: 'Hindi', format: 'Old songs', stream: 'https://stream.zeno.fm/rm4i9pdex3cuv', icon: '🕺' },
        { name: 'Mohammed Rafi Radio', freq: '95.0', city: 'Mumbai', lang: 'Hindi', format: 'Old songs', stream: 'https://stream.zeno.fm/2xx62x8ztm0uv', icon: '🕺' }
      ];

      // DOM Elements
      const app = document.getElementById('app');
      const stationGrid = document.getElementById('stationGrid');
      const categoryContainer = document.getElementById('categoryContainer');
      const searchInput = document.getElementById('searchInput');
      const player = document.getElementById('player');
      const playerClose = document.getElementById('playerClose');
      const audioPlayer = document.getElementById('audioPlayer');
      const playBtn = document.getElementById('playBtn');
      const miniPlayBtn = document.getElementById('miniPlayBtn');
      const playIcon = document.getElementById('playIcon');
      const miniPlayIcon = document.getElementById('miniPlayIcon');
      const volumeSlider = document.getElementById('volumeSlider');

      const playerName = document.getElementById('playerName');
      const playerIcon = document.getElementById('playerIcon');
      const playerStatus = document.getElementById('playerStatus');
      const playerMainInfo = document.getElementById('playerMainInfo');

      const featuredCard = document.getElementById('featuredCard');
      const featuredName = document.getElementById('featuredName');
      const featuredFreq = document.getElementById('featuredFreq');
      const featuredCity = document.getElementById('featuredCity');

      // State
      let activeStation = stations[0];
      let currentCategory = 'All';
      let searchQuery = '';
      let isPlaying = false;
      let isExpanded = false;

      // Init
      function init() {
        renderCategories();
        renderStations();
        updateFeatured(stations[0]);
        setupEventListeners();
      }

      function renderCategories() {
        const formats = ['All', ...new Set(stations.map(s => s.format))];
        categoryContainer.innerHTML = formats.map(f => `
          <div class="pill ${f === currentCategory ? 'active' : ''}" data-category="${f}">${f}</div>
        `).join('');
      }

      function renderStations() {
        const filtered = stations.filter(s => {
          const matchesCat = currentCategory === 'All' || s.format === currentCategory;
          const matchesSearch = s.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
            s.city.toLowerCase().includes(searchQuery.toLowerCase());
          return matchesCat && matchesSearch;
        });

        if (filtered.length === 0) {
          stationGrid.innerHTML = `
            <div class="no-results">
              <i class="fas fa-radio"></i>
              <p>No stations found for "${searchQuery}"</p>
            </div>
          `;
          return;
        }

        stationGrid.innerHTML = filtered.map((s, index) => `
          <div class="station-card fade-in ${activeStation.name === s.name ? 'active' : ''}" 
               style="animation-delay: ${index * 0.05}s"
               onclick="selectStation('${s.name}')">
            <div class="station-image">${s.icon || '📻'}</div>
            <div class="station-details">
              <div class="station-name">${s.name}</div>
              <div class="station-meta">
                <span class="station-freq">${s.freq} MHz</span>
                <span>•</span>
                <span>${s.city}</span>
              </div>
            </div>
           
          </div>
        `).join('');
      }

      function updateFeatured(s) {
        featuredName.innerText = s.name;
        featuredFreq.innerText = `${s.freq} MHz`;
        featuredCity.innerText = s.city;
        featuredCard.onclick = () => selectStation(s.name);
      }

      window.selectStation = function (name) {
        const s = stations.find(st => st.name === name);
        if (!s) return;

        activeStation = s;
        playerName.innerText = s.name;
        playerIcon.innerText = s.icon || '📻';

        // Update Grid UI
        renderStations();

        // Audio Logic
        if (audioPlayer.src !== s.stream) {
          audioPlayer.src = s.stream;
          audioPlayer.load();
          if (isPlaying) playAudio();
        }
      };

      function togglePlay() {
        if (isPlaying) {
          pauseAudio();
        } else {
          playAudio();
        }
      }

      function playAudio() {
        if (!audioPlayer.src) {
          audioPlayer.src = activeStation.stream;
          audioPlayer.load();
        }

        audioPlayer.play().then(() => {
          isPlaying = true;
          playIcon.className = 'fas fa-pause';
          miniPlayIcon.className = 'fas fa-pause';
          playerStatus.innerText = 'Live - Streaming';
        }).catch(err => {
          console.error("Playback failed", err);
          playerStatus.innerText = 'Error - Stream Offline';
        });
      }

      function pauseAudio() {
        audioPlayer.pause();
        isPlaying = false;
        playIcon.className = 'fas fa-play';
        miniPlayIcon.className = 'fas fa-play';
        playerStatus.innerText = 'Live - Paused';
      }

      function setupEventListeners() {
        // Search
        searchInput.addEventListener('input', (e) => {
          searchQuery = e.target.value;
          renderStations();
        });

        // Categories
        categoryContainer.addEventListener('click', (e) => {
          if (e.target.classList.contains('pill')) {
            currentCategory = e.target.dataset.category;
            renderCategories();
            renderStations();
          }
        });

        // Player Expand/Collapse
        playerMainInfo.addEventListener('click', () => {
          if (!isExpanded) {
            app.classList.add('player-expanded');
            isExpanded = true;
          }
        });

        playerClose.addEventListener('click', (e) => {
          e.stopPropagation();
          app.classList.remove('player-expanded');
          isExpanded = false;
        });

        // Play/Pause
        playBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          togglePlay();
        });

        miniPlayBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          togglePlay();
        });

        // Volume
        volumeSlider.addEventListener('input', (e) => {
          audioPlayer.volume = e.target.value;
        });

        // Audio Events
        audioPlayer.addEventListener('waiting', () => {
          playerStatus.innerText = 'Buffering...';
        });

        audioPlayer.addEventListener('playing', () => {
          playerStatus.innerText = 'Live - Streaming';
        });
      }

      init();
    })();
  </script>
</body>

</html>
