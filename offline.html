<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vision FM · Offline</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --accent: #f59e0b; --bg: #09090b; --text: #fafafa; --muted: #a1a1aa; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      padding: 30px;
    }
    .icon-ring {
      width: 110px; height: 110px; border-radius: 50%;
      background: rgba(245,158,11,0.12); border: 2px solid rgba(245,158,11,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem; margin-bottom: 32px;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(245,158,11,0.3); }
      50% { box-shadow: 0 0 0 20px rgba(245,158,11,0); }
    }
    h1 { font-family: 'Outfit', sans-serif; font-size: 1.8rem; margin-bottom: 12px; }
    p { color: var(--muted); font-size: 1rem; line-height: 1.6; max-width: 300px; margin-bottom: 32px; }
    .retry-btn {
      background: var(--accent); color: #000;
      border: none; padding: 14px 36px; border-radius: 50px;
      font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s;
    }
    .retry-btn:hover { opacity: 0.85; }
    .logo { color: var(--accent); font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.1rem; margin-bottom: 40px; }
  </style>
</head>
<body>
  <div class="logo">⚡ Vision FM</div>
  <div class="icon-ring">📡</div>
  <h1>You're Offline</h1>
  <p>No internet connection found. Connect to the internet to stream live radio stations.</p>
  <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
</body>
</html>
